[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "distill-lib"
version = "0.1.0"
description = "DB-decoupled workflow engine package for Distill"
requires-python = ">=3.10"
dependencies = [
    "apscheduler==3.11.0",
    "beautifulsoup4==4.13.4",
    "feedparser==6.0.11",
    "google-genai~=1.15.0",
    "httpx~=0.28.1",
    "langgraph~=0.2.0",
    "lxml~=5.4.0",
    "lxml-html-clean>=0.4.3",
    "openai~=1.78.0",
    "pydantic~=2.11.4",
    "python-dotenv==1.1.0",
    "tavily-python~=0.5.0",
    "toml==0.10.2",
    "trafilatura~=1.6.0",
    "typing-extensions>=4.12.2,<5",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
include = ["distill_lib*"]
