<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
<!-- 定义渐变和滤镜 -->
<defs>
<linearGradient id="funnelGradient" x1="256" y1="150" x2="256" y2="450" gradientUnits="userSpaceOnUse">
<stop stop-color="#6366F1" />
<stop offset="1" stop-color="#4F46E5" />
</linearGradient>
<linearGradient id="glowGradient" x1="256" y1="380" x2="256" y2="480" gradientUnits="userSpaceOnUse">
<stop stop-color="#818CF8" stop-opacity="0.6" />
<stop offset="1" stop-color="#818CF8" stop-opacity="0" />
</linearGradient>
<filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
<feGaussianBlur stdDeviation="5" result="blur" />
<feComposite in="SourceGraphic" in2="blur" operator="over" />
</filter>
</defs>

<!-- 背景装饰光晕 -->

<circle cx="256" cy="420" r="60" fill="url(#glowGradient)" />

<!-- 原始数据输入 (漏斗上方) -->

<g opacity="0.7">
<rect x="210" y="40" width="20" height="20" rx="4" fill="#818CF8" />
<circle cx="280" cy="60" r="10" fill="#A5B4FC" />
<rect x="240" y="80" width="15" height="15" rx="3" fill="#6366F1" />
<circle cx="190" cy="90" r="7" fill="#C7D2FE" />
<rect x="310" y="85" width="12" height="12" rx="2" fill="#4F46E5" />
</g>

<!-- 漏斗主体 -->

<!-- 漏斗上边缘 -->

<path d="M100 150C100 130 170 115 256 115C342 115 412 130 412 150C412 170 342 185 256 185C170 185 100 170 100 150Z" fill="#EEF2FF" stroke="#6366F1" stroke-width="4" />

<!-- 漏斗中段 -->

<path d="M100 150C100 170 150 185 256 185C362 185 412 170 412 150L310 380H202L100 150Z" fill="url(#funnelGradient)" fill-opacity="0.9" />

<!-- 内部处理中的数据流 -->

<path d="M220 220L256 320L292 220" stroke="white" stroke-width="2" stroke-dasharray="8 4" opacity="0.4" />
<circle cx="256" cy="260" r="5" fill="white" opacity="0.6" />

<!-- 漏斗出口 -->

<path d="M202 380C202 370 225 365 256 365C287 365 310 370 310 380V410C310 425 256 430 256 430C256 430 202 425 202 410V380Z" fill="#3730A3" />

<!-- 提炼后的精华 (底部输出) -->

<g filter="url(#softGlow)">
<path d="M256 440L270 465L256 490L242 465L256 440Z" fill="#FDE047" />
<circle cx="256" cy="465" r="8" fill="#FACC15" fill-opacity="0.5" />
</g>

<!-- 装饰线条表示动感 -->

<line x1="240" y1="395" x2="272" y2="395" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.3" />
</svg>